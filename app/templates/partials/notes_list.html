{% if notes %}
<ul class="space-y-2">
    {% for note in notes %}
    <li class="flex justify-between items-start bg-gray-50 rounded p-2">
        <div>
            <p class="text-sm text-gray-700">{{ note.content }}</p>
            <p class="text-xs text-gray-400">{{ note.created_at.strftime('%b %d, %Y %H:%M') }}</p>
        </div>
        <button hx-delete="/properties/notes/{{ note.id }}?property_id={{ property_id }}"
                hx-target="#notes-list-{{ property_id }}"
                hx-swap="innerHTML"
                class="text-red-500 hover:text-red-700 text-xs">
            Delete
        </button>
    </li>
    {% endfor %}
</ul>
{% else %}
<p class="text-sm text-gray-500">No notes yet</p>
{% endif %}
